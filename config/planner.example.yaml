# Copy this file to config/planner.local.yaml and replace every placeholder.
# Quote every Lunch Money account and category ID, including numeric IDs and
# source-scoped IDs such as "manual:123" and "plaid:456". Keep human-readable
# account names only in nearby YAML comments so account IDs appear in one place:
# as accountMappings keys.

currentAge: 38
retirementAge: 62
projectionEndAge: 95
retirementGoal: 0
transactionTrailingMonths: 12

# Government benefits are explicit, dated planning inputs. The bundled CPP
# reference is a published average, not a personal estimate or entitlement.
governmentBenefits:
  cpp:
    startAge: 65
    indexingRate: 0.02
    amountAt65:
      source: canadian_reference

  # OAS eligibility is never inferred. Use partial with 1–39 qualifying years,
  # or none to intentionally model no OAS.
  oas:
    startAge: 65
    indexingRate: 0.02
    fullAmountAt65:
      source: canadian_reference
    eligibility:
      mode: full

# Employment phases cover every projection month from currentAge through
# retirementAge. Net deposited cash is separate from the four explicit inputs
# used to forecast future RRSP room. Explicit zero is valid; omission is not.
employmentIncomePhases:
  - id: current-income
    label: Current income
    startAge: 38
    endAge: 41
    annualNetCashToday: live_baseline
    annualGrowth: 0
    rrspRoom:
      eligibleEarnedIncomeToday: 100000
      pensionAdjustmentToday: 0
      otherReductionToday: 0
      annualGrowth: 0

  - id: future-income
    label: Expected future income
    startAge: 41
    endAge: 62
    annualNetCashToday: 72000
    annualGrowth: 0.02
    rrspRoom:
      eligibleEarnedIncomeToday: 110000
      pensionAdjustmentToday: 0
      otherReductionToday: 0
      annualGrowth: 0.02

# Account roles are the only owner-facing routing references. The operating
# account must be a reserve member. The reserve-refill role marks the one cash
# account that receives reserve-building deposits. Personal and workplace RRSP
# roles must be on different accounts.
accountMappings:
  "manual:synthetic-operating-cash":
    # Daily operating cash
    include: true
    type: cash
    roles: [operating_cash, reserve_member]
    withdrawalPriority: 1

  "manual:synthetic-reserve-refill":
    # Emergency-reserve refill account
    include: true
    type: cash
    roles: [reserve_member, reserve_refill]
    withdrawalPriority: 2

  "plaid:synthetic-personal-tfsa":
    # Personal TFSA
    include: true
    type: tfsa
    roles: [personal_tfsa]
    withdrawalPriority: 3

  "plaid:synthetic-personal-rrsp":
    # Personal RRSP
    include: true
    type: rrsp
    roles: [personal_rrsp]
    withdrawalPriority: 4

  "plaid:synthetic-workplace-rrsp":
    # Workplace RRSP
    include: true
    type: rrsp
    roles: [workplace_rrsp]
    withdrawalPriority: 5

  # Add personal_taxable to one included non-registered mapping when a real
  # taxable account should receive savings. When it is absent, the planner
  # automatically creates a projection-only future taxable account with a
  # fixed zero opening balance and the non-registered assumptions below.

  "manual:synthetic-excluded-account":
    # Closed or out-of-scope account
    include: false
    type: exclude

# These are owner-supplied room amounts available at projection start. They are
# never inferred from balances, transactions, income, or account age. January
# starts may omit beforeProjectionStart and compile it to explicit zeros.
# February–December starts require the year-to-date values shown below.
registeredRoom:
  tfsa:
    availableAtStart: 12000
    asOf: "2026-07-01"

  rrsp:
    availableAtStart: 18000
    asOf: "2026-07-01"
    beforeProjectionStart:
      eligibleEarnedIncome: 50000
      pensionAdjustment: 4000
      otherReduction: 0

# Only these explicit savings plans may be invested. Workplace RRSP receives
# first claim on the one global RRSP room pool and its overflow is unallocated.
# Personal cash follows TFSA → personal RRSP → taxable and never uses the
# workplace account. Reserve-building cash stays in the refill account until
# the indexed combined target is reached; a same-month crossing amount uses the
# personal order. Every other positive dollar remains in operating cash.
savingsPolicy:
  unplannedCash: retain_in_operating_cash

  personalInvesting:
    order: [personal_tfsa, personal_rrsp, taxable]
    phases:
      - id: current-personal-saving
        label: Current personal saving
        startAge: 38
        endAge: 41
        monthlyAmountToday: 1000
        indexingRate: 0
      - id: future-personal-saving
        label: Future personal saving
        startAge: 41
        endAge: 62
        monthlyAmountToday: 1250
        indexingRate: 0.02

  reserveBuilding:
    targetToday: 40000
    indexingRate: 0.02
    phases:
      - id: reserve-building
        label: Emergency reserve building
        startAge: 38
        endAge: 45
        monthlyAmountToday: 500
        indexingRate: 0
    afterTarget: personal_investing

  workplaceRrsp:
    roomPriority: first
    overflow: unallocated
    phases:
      - id: workplace-saving
        label: Workplace RRSP saving
        startAge: 38
        endAge: 62
        monthlyAmountToday: 800
        indexingRate: 0.02

categoryMappings:
  "synthetic-essential-category": essential # Groceries
  "synthetic-discretionary-category": discretionary # Entertainment
  "synthetic-income-category": income # Employment income
  "synthetic-transfer-category": transfer # Internal transfer
  # Explicit savingsPolicy amounts drive projection deposits in simple mode.
  # Historical investment transactions may remain excluded from cash-flow
  # totals rather than repeating an account ID in category configuration.
  "synthetic-investment-transfer-category": transfer
  "uncategorized": exclude

assumptions:
  # Rates use decimal values: 0.02 means 2% per year. Dollar values are today's
  # dollars unless the report says otherwise.
  inflation: 0.02
  cashReturn: 0.02
  tfsaReturn: 0.05
  rrspReturn: 0.05
  nonRegisteredReturn: 0.05
  debtReturn: 0
  effectiveTaxRate: 0.22
  oasRecoveryThreshold: 90000
  oasRecoveryRate: 0.15
  pensionAnnualIncome: 0
  pensionStartAge: 65
  pensionIndexing: 0.02
  rrifConversionAge: 71

  allocations:
    cash: { cash: 1, fixedIncome: 0, equity: 0 }
    tfsa: { cash: 0, fixedIncome: 0.2, equity: 0.8 }
    rrsp: { cash: 0, fixedIncome: 0.3, equity: 0.7 }
    non_registered: { cash: 0.05, fixedIncome: 0.25, equity: 0.7 }
    debt: { cash: 0, fixedIncome: 0, equity: 0 }

# Future events are optional and use today's dollars. The simple primary path
# keeps account IDs under accountMappings; advanced targeted-account events are
# documented with the advanced compatibility format.
futureEvents: []
