# Copy this file to config/planner.local.yaml, then replace the synthetic
# examples with your own planning information. Keep account and category IDs in
# quotation marks. Existing users should usually keep the IDs already in their
# private file.

# Enter your age now, the age when work income ends, and the last age to show.
# retirementGoal is the financial-asset amount you want at retirement, in
# today's dollars. transactionTrailingMonths controls how many recent months
# are used to estimate ordinary income and spending; 12 means the past year.
currentAge: 38
retirementAge: 62
projectionEndAge: 95
retirementGoal: 0
transactionTrailingMonths: 12

# Adjust how the live Lunch Money spending baseline changes over time. These
# phases are independent of employment income. Ages include startAge and stop
# before endAge, and the phases must cover currentAge through projectionEndAge
# without gaps. A multiplier of 1 keeps the current baseline; 0.60 uses 60% of
# it, which is a 40% reduction. Spending continues to grow with inflation.
# Leave out spendingPhases to keep both baselines unchanged for the full plan.
spendingPhases:
  - id: current-lifestyle
    label: Current working lifestyle
    startAge: 38
    endAge: 62
    essentialMultiplier: 1
    discretionaryMultiplier: 1

  - id: retirement-lifestyle
    label: Retirement lifestyle
    startAge: 62
    endAge: 95
    essentialMultiplier: 1
    discretionaryMultiplier: 0.60

# Choose when CPP and OAS begin and how their payments grow each year.
# canadian_reference uses the dated public amount bundled with the planner.
# For CPP, replace it with your own Service Canada estimate when available;
# the public average is not your personal entitlement.
governmentBenefits:
  cpp:
    startAge: 65
    indexingRate: 0.02
    amountAt65:
      source: canadian_reference

  # OAS eligibility depends mainly on years lived in Canada after age 18.
  # Use full when you expect 40 or more qualifying years, partial for 1–39
  # years, or none when you do not want OAS included. Check your Service Canada
  # record if you are unsure; do not estimate eligibility from your CPP amount.
  oas:
    startAge: 65
    indexingRate: 0.02
    fullAmountAt65:
      source: canadian_reference
    eligibility:
      mode: full

# List each period with a different income assumption. Ages include startAge
# but stop before endAge; for example, 38 to 41 covers ages 38, 39, and 40.
# annualNetCashToday is take-home cash available for the budget. Use
# live_baseline for the current job, or enter an annual take-home estimate from
# recent pay statements for a future job. annualGrowth of 0.02 means 2% yearly.
employmentIncomePhases:
  - id: current-income # A short, unique name used only inside this file.
    label: Current income # The name shown in the planner.
    startAge: 38
    endAge: 41
    annualNetCashToday: live_baseline
    annualGrowth: 0

    # This block estimates the new RRSP room this job creates in later years.
    # It is separate from take-home cash above. eligibleEarnedIncomeToday is
    # annual gross employment income that counts for RRSP room; find it on pay
    # statements or an employment agreement. pensionAdjustmentToday is the
    # expected annual RPP/DPSP adjustment, often reported in Box 52 of a T4; a
    # group RRSP by itself often has none. otherReductionToday is for uncommon
    # pension-related reductions, so most people enter 0. annualGrowth of 0.02
    # raises these estimates by 2% a year; 0 keeps them flat.
    rrspRoom:
      eligibleEarnedIncomeToday: 100000
      pensionAdjustmentToday: 0
      otherReductionToday: 0
      annualGrowth: 0

  - id: future-income
    label: Expected future income
    startAge: 41
    endAge: 62
    annualNetCashToday: 72000
    annualGrowth: 0.02
    rrspRoom:
      eligibleEarnedIncomeToday: 110000
      pensionAdjustmentToday: 0
      otherReductionToday: 0
      annualGrowth: 0.02

# This section lists the Lunch Money accounts included in your plan. Each
# quoted key is a Lunch Money account ID. You can also find it as `id` in the
# account snapshot JSON. include decides whether the account is part of the
# plan. type says what kind of account it is. roles describe how you use it.
# withdrawalPriority is the order used when retirement cash is short: 1 is
# withdrawn before 2, then 3, and so on.
#
# Available roles:
# - operating_cash: the chequing or cash account where income and ordinary
#   leftover money remain. Exactly one included cash account needs this role.
# - reserve_member: a cash balance that counts toward your emergency-fund
#   target. More than one cash account may have this role.
# - reserve_refill: the one cash account that receives planned emergency-fund
#   deposits. It must also be a reserve_member.
# - personal_tfsa: the TFSA used for personal investing.
# - personal_rrsp: the RRSP used for personal cash contributions.
# - workplace_rrsp: the RRSP funded through payroll.
# - personal_taxable: an optional real non-registered investment account. If
#   you leave this role out, the planner adds a future taxable account starting
#   at $0.
# - primary_residence: the Lunch Money manual asset whose balance is your
#   current home-value estimate. The balance date becomes the valuation date.
# - primary_mortgage: the one debt linked to the primary residence. Leave this
#   role out when the residence is mortgage-free.
#
# For example, chequing can be both operating_cash and reserve_member, while a
# savings account can be both reserve_member and reserve_refill. Personal and
# workplace RRSP roles must be assigned to different accounts.
accountMappings:
  "manual:synthetic-operating-cash":
    # Everyday chequing or cash
    include: true
    type: cash
    roles: [operating_cash, reserve_member]
    withdrawalPriority: 1

  "manual:synthetic-reserve-refill":
    # Emergency-fund savings or cash
    include: true
    type: cash
    roles: [reserve_member, reserve_refill]
    withdrawalPriority: 2

  "plaid:synthetic-personal-tfsa":
    # TFSA used for personal saving
    include: true
    type: tfsa
    roles: [personal_tfsa]
    withdrawalPriority: 3

  "plaid:synthetic-personal-rrsp":
    # RRSP funded from personal cash
    include: true
    type: rrsp
    roles: [personal_rrsp]
    withdrawalPriority: 4

  "plaid:synthetic-workplace-rrsp":
    # RRSP funded through payroll
    include: true
    type: rrsp
    roles: [workplace_rrsp]
    withdrawalPriority: 5

  "manual:synthetic-primary-residence":
    # Your home recorded as a Lunch Money manual asset. Keep its balance and
    # balance date current in Lunch Money; do not repeat the value here.
    include: true
    type: real_estate
    roles: [primary_residence]
    # Enter the yearly growth assumption used after the imported valuation.
    # For example, 0.02 is 2% and 0 keeps the value flat. The home contributes
    # to net worth but is not available for retirement withdrawals.
    annualAppreciation: 0.02

  # If your home is not a Lunch Money account, leave out the real_estate
  # mapping above and use the top-level primaryResidence fallback documented
  # in README.md. Never configure both sources.

  "manual:synthetic-primary-mortgage":
    # The mortgage linked to the primary residence. Debt has no investment
    # return, asset allocation, or withdrawal priority.
    include: true
    type: debt
    roles: [primary_mortgage]
    liability:
      mode: amortizing
      # Enter the current annual mortgage rate from the lender statement.
      # Then choose the compounding convention stated in the agreement.
      # Standard Canadian mortgages normally use canadian_mortgage; use
      # effective_annual only when the agreement explicitly quotes an
      # effective annual rate. Renewal and rate changes are not modelled.
      annualInterestRate: 0.04
      interestRateConvention: canadian_mortgage
      # Enter the amount and frequency shown in the payment agreement. The
      # planner converts it to a monthly equivalent but retains both values.
      regularPayment:
        amount: 1200
        frequency: biweekly
      # Enter the effective date of the current rate and payment schedule,
      # usually shown on the latest mortgage agreement or renewal statement.
      # It must be on or before the projection start because future borrowing
      # is not modelled. Optional lump sums need an explicit date and amount;
      # find both in your lender records and use [] when none are planned.
      scheduleStartDate: "2026-01-15"
      lumpSumPayments: []
      # Use this matcher when mortgage payments share a category with other
      # spending. Enter the exact Lunch Money account that pays the mortgage
      # and the payee as it appears on posted transactions. Matching ignores
      # case and harmless extra spaces, but never uses amount, date, partial
      # text, or fuzzy matching. The raw payee and account ID are never
      # included in planner exports.
      historicalPayment:
        mode: payee_and_source_account
        sourceAccountId: "manual:synthetic-operating-cash"
        payee: "Synthetic mortgage payment"

      # The full scheduled payment reduces retirement cash. Interest is an
      # expense; principal reduces cash and debt together, so it is not
      # consumption. Payments stop when the balance reaches $0.
      #
      # For a non-zero short-term debt you intend to settle immediately, use
      # `mode: payoff_at_projection_start` instead of the schedule fields. That
      # opening balance appears in starting net worth and is paid in month one.

  "manual:synthetic-excluded-account":
    # Set include to false and type to exclude for a closed or out-of-scope
    # account. Do not give an excluded account any roles.
    include: false
    type: exclude

# Enter how much more you may contribute on the date shown. These are remaining
# contribution-room amounts, not account balances, annual limits, or lifetime
# contributions. asOf is the date when you calculated each remaining amount.
registeredRoom:
  tfsa:
    # Start with TFSA room shown in CRA My Account, then subtract any newer TFSA
    # contributions CRA has not recorded yet. Do not add a current-year
    # withdrawal back until January of the next calendar year. For example, if
    # CRA shows $15,000 and you contributed $3,000 afterward, enter 12000.
    availableAtStart: 12000
    asOf: "2026-07-01"

  rrsp:
    # Find available RRSP contribution room on your latest CRA Notice of
    # Assessment/Reassessment or in CRA My Account. Subtract personal,
    # workplace, and employer RRSP contributions made after that figure.
    # Personal and workplace RRSPs share this one room pool. For example, if CRA
    # shows $25,000 and $7,000 was contributed afterward, enter 18000.
    availableAtStart: 18000
    asOf: "2026-07-01"

    # RRSP room added next January depends on income earned during this calendar
    # year. Enter totals from January 1 through the day before this plan starts.
    # For a July 1 start, enter January-through-June totals. If the plan starts
    # in January, omit this whole section because there are no earlier months.
    currentYearBeforePlanStart:
      # Gross employment income earned so far this year that counts toward RRSP
      # room. Use gross pay, not take-home pay. Find year-to-date gross income
      # on payroll statements and adjust it if not all income is eligible.
      eligibleEarnedIncome: 50000

      # Usually related to an RPP or DPSP and commonly shown in Box 52 of a T4.
      # A group RRSP by itself often has no pension adjustment; enter 0 then.
      pensionAdjustment: 4000

      # Uncommon pension-related reductions. Most people enter 0.
      otherReduction: 0

# Only amounts listed in these plans are deliberately saved or invested. The
# planner does not invest every dollar left after expenses unless you choose the
# explicit sweep policy below.
savingsPolicy:
  # This is the everyday cash balance to keep before sweeping extra cash. Enter
  # the target in today's dollars and how it should grow each year. For example,
  # 0.02 means 2% annual indexing. Do not infer this from monthly spending.
  operatingCash:
    targetToday: 10000
    indexingRate: 0.02

  # sweep_above_targets keeps enough cash for both the operating target above
  # and the combined emergency reserve below, then invests the rest through the
  # personal order. Use retain_in_operating_cash to keep all unplanned positive
  # cash in the everyday account exactly as before.
  unplannedCash: sweep_above_targets

  # Money deliberately moved from cash into investments follows TFSA, then the
  # personal RRSP, then taxable. It never goes to the workplace RRSP. If no real
  # account has personal_taxable, the planner adds a future $0 taxable account.
  personalInvesting:
    order: [personal_tfsa, personal_rrsp, taxable]
    phases:
      # Every savings phase uses these six fields:
      # id is a short unique name; label is what the planner displays; startAge
      # is the first active age; endAge is excluded; monthlyAmountToday is the
      # amount in today's dollars; indexingRate is yearly growth (0.02 is 2%,
      # while 0 keeps the amount flat).
      - id: current-personal-saving
        label: Current personal saving
        startAge: 38
        endAge: 41
        monthlyAmountToday: 1000
        indexingRate: 0
      - id: future-personal-saving
        label: Future personal saving
        startAge: 41
        endAge: 62
        monthlyAmountToday: 1250
        indexingRate: 0.02

  # This is the planned monthly emergency-fund deposit. The combined balances
  # of all reserve_member accounts are compared with targetToday. Deposits go
  # to reserve_refill until the indexed target is reached. If one deposit
  # crosses the target, only the amount needed stays in cash and the remainder
  # is invested that month. After the target, the full plan follows the
  # personal investing order. If operating_cash is also a reserve_member, its
  # balance counts toward this combined target; the two targets are not added.
  reserveBuilding:
    targetToday: 40000
    indexingRate: 0.02
    phases:
      - id: reserve-building
        label: Emergency reserve building
        startAge: 38
        endAge: 45
        monthlyAmountToday: 500
        indexingRate: 0
    afterTarget: personal_investing

  # Enter payroll-deducted contributions deposited into the workplace RRSP.
  # They use the shared RRSP room before optional personal RRSP deposits. When
  # room is insufficient, the planner reports the unsupported amount instead
  # of pretending it was deposited elsewhere.
  workplaceRrsp:
    roomPriority: first
    overflow: unallocated
    phases:
      - id: workplace-saving
        label: Workplace RRSP saving
        startAge: 38
        endAge: 62
        monthlyAmountToday: 800
        indexingRate: 0.02

# Map each Lunch Money category ID to how it affects the plan. Find category IDs
# as `id` in the category snapshot JSON. Use essential for needs, discretionary
# for optional spending, income for cash income, transfer for money moved
# between your accounts, and exclude for anything the plan should ignore.
# The mortgage matcher above runs before these category rules. This means a
# matched mortgage payment can share the broad home/auto category below while
# unrelated transactions in that category remain ordinary spending.
#
# If a liability has its own dedicated category instead, you may map that
# category as debt_payment with liabilityRole: primary_mortgage. Use only one
# historical-payment method for a liability. Principal reduces both cash and
# debt, while interest is consumption.
categoryMappings:
  "synthetic-essential-category": essential # For example, groceries.
  "synthetic-discretionary-category": discretionary # For example, entertainment.
  "synthetic-income-category": income # For example, employment income.
  "synthetic-transfer-category": transfer # For example, an internal transfer.
  "synthetic-investment-transfer-category": transfer
  "synthetic-home-auto-category": essential
  "uncategorized": exclude

assumptions:
  # Rates are decimals: 0.02 means 2% per year. Enter reasonable long-term
  # planning estimates, not recent one-month returns. Dollar amounts are in
  # today's dollars unless a report says otherwise.
  inflation: 0.02
  cashReturn: 0.02
  tfsaReturn: 0.05
  rrspReturn: 0.05
  nonRegisteredReturn: 0.05
  effectiveTaxRate: 0.22
  oasRecoveryThreshold: 90000
  oasRecoveryRate: 0.15
  pensionAnnualIncome: 0
  pensionStartAge: 65
  pensionIndexing: 0.02
  rrifConversionAge: 71

  # Each allocation is the fraction held in cash, fixed income, and equity.
  # The three values must add to 1. For example, 0.2 means 20%.
  allocations:
    cash: { cash: 1, fixedIncome: 0, equity: 0 }
    tfsa: { cash: 0, fixedIncome: 0.2, equity: 0.8 }
    rrsp: { cash: 0, fixedIncome: 0.3, equity: 0.7 }
    non_registered: { cash: 0.05, fixedIncome: 0.25, equity: 0.7 }

# Add known one-time future income or expenses here, in today's dollars. Leave
# [] when there are none. Account-specific event destinations are available in
# the advanced format; do not repeat account IDs here in this simple file.
futureEvents: []
