# Copy this file to config/planner.local.yaml and replace every placeholder.
# Quote every Lunch Money account and category ID, including numeric IDs and
# source-scoped IDs such as "manual:123" and "plaid:456". Add a nearby YAML
# comment with the human-readable name so each opaque ID remains maintainable.

currentAge: 38
retirementAge: 62
projectionEndAge: 95
retirementGoal: 0
transactionTrailingMonths: 12

# Government benefits are explicit, dated planning inputs. The bundled CPP
# reference is the published average for new beneficiaries at age 65—not a
# personal estimate or entitlement. In private configuration, amountAt65 may
# instead use official_estimate or configured_amount with monthlyAmountToday
# and effectiveDate, or explicit_zero to intentionally model no CPP.
governmentBenefits:
  cpp:
    startAge: 65
    indexingRate: 0.02
    amountAt65:
      source: canadian_reference

  # OAS resolves the published full amount separately from eligibility. The
  # planner never infers residence eligibility. Use mode: partial with an
  # integer qualifyingResidenceYearsAfter18 from 1 through 39, or mode: none
  # to explicitly model no OAS.
  oas:
    startAge: 65
    indexingRate: 0.02
    fullAmountAt65:
      source: canadian_reference
    eligibility:
      mode: full

# Employment phases must cover every projection month from currentAge through
# retirementAge. startAge is inclusive and endAge is exclusive, so these two
# phases meet at age 41 without a gap or overlap.
employmentIncomePhases:
  - id: current-income
    label: Current income
    startAge: 38
    endAge: 41
    # live_baseline resolves to annualized net employment cash derived from the
    # configured Lunch Money transaction window.
    annualNetCashToday: live_baseline
    # Growth starts at the beginning of this phase.
    annualGrowth: 0

  - id: future-income
    label: Expected future income
    startAge: 41
    endAge: 62
    # Future income must be configured explicitly; the planner does not assume
    # that today’s income continues indefinitely or forecast a future salary.
    annualNetCashToday: 72000
    annualGrowth: 0.02

accountMappings:
  # Set include: true and choose a financial type for every account used by the
  # projection. Set include: false with type: exclude for every ignored account.
  "manual:replace-with-cash-account-id":
    # Daily chequing account
    include: true
    type: cash
    # Lower numbers are withdrawn first when projected cash flow is short.
    withdrawalPriority: 1

  "plaid:replace-with-investment-account-id":
    # Long-term tax-free investment account
    include: true
    type: tfsa
    withdrawalPriority: 2
    contributionPhases:
      - id: current-saving
        label: Current saving
        startAge: 38
        endAge: 41
        # Inside an explicit contribution phase, live_baseline resolves only
        # from mapped Lunch Money contribution transactions for this account.
        # Legacy account-level contribution fields are a separate compatibility
        # input and cannot be combined with contributionPhases.
        monthlyAmountToday: live_baseline
        # cash: contribution leaves available cash as an outflow.
        funding: cash
        # Indexing starts at the beginning of this phase.
        indexingRate: 0
      - id: future-saving
        label: Future saving
        startAge: 41
        endAge: 62
        monthlyAmountToday: 500
        # income_withheld grows the investment without reducing deposited cash
        # a second time because it was withheld before cash reached Lunch Money.
        funding: income_withheld
        indexingRate: 0.02

  "manual:replace-with-excluded-account-id":
    # Closed or otherwise out-of-scope account
    include: false
    type: exclude

categoryMappings:
  # Keep category IDs quoted even when Lunch Money returns numeric IDs. The inline
  # comments document the human-readable category names.
  "replace-with-essential-category-id": essential # Groceries
  "replace-with-discretionary-category-id": discretionary # Entertainment
  "replace-with-income-category-id": income # Employment income
  "replace-with-transfer-category-id": transfer # Internal transfer
  "replace-with-contribution-category-id":
    # Registered investment deposit
    classification: investment_contribution
    # Map the transaction to its target investment account and debit/credit sign.
    contributionAccountId: "plaid:replace-with-investment-account-id"
    contributionDirection: debit
  "uncategorized": exclude # Transactions intentionally omitted from the plan

assumptions:
  # Rates use decimal values: 0.02 means 2% per year. Dollar values are today's
  # dollars unless the planner documentation says otherwise.
  inflation: 0.02
  cashReturn: 0.02
  tfsaReturn: 0.05
  rrspReturn: 0.05
  nonRegisteredReturn: 0.05
  debtReturn: 0
  effectiveTaxRate: 0.22
  oasRecoveryThreshold: 90000
  oasRecoveryRate: 0.15
  pensionAnnualIncome: 0
  pensionStartAge: 65
  pensionIndexing: 0.02
  rrifConversionAge: 71

  # Each allocation contains cash, fixed income, and equity fractions that sum
  # to 1. Account-level allocation values may override these type defaults.
  allocations:
    cash: { cash: 1, fixedIncome: 0, equity: 0 }
    tfsa: { cash: 0, fixedIncome: 0.2, equity: 0.8 }
    rrsp: { cash: 0, fixedIncome: 0.3, equity: 0.7 }
    non_registered: { cash: 0.05, fixedIncome: 0.25, equity: 0.7 }
    debt: { cash: 0, fixedIncome: 0, equity: 0 }

# Future events are optional one-time inflows or outflows in today's dollars.
# Replace [] with entries like the commented example and quote target account IDs.
futureEvents: []
