services:
  planner:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      LUNCHMONEY_API_TOKEN: ${LUNCHMONEY_API_TOKEN:-}
      PLANNER_CONFIG_PATH: /app/config/planner.local.json
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Retirement Planner}
    volumes:
      - ./config/planner.local.json:/app/config/planner.local.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
